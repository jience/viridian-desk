<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="leftGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a5f4a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E5A4B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rightGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1DB954;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- V 图标（缩小版） -->
  <g transform="translate(0, 0)">
    <polygon points="60,20 20,100 35,100 60,50" fill="url(#leftGrad)" />
    <polygon points="60,20 100,100 85,100 60,50" fill="url(#rightGrad)" />
  </g>

  <!-- 文字：Viridian -->
  <text x="80" y="62" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="700" fill="#2E5A4B" letter-spacing="1">
    Viridian
  </text>

  <!-- 文字：Desk（更细或不同色） -->
  <text x="195" y="62" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="400" fill="#1DB954" letter-spacing="1">
    Desk
  </text>

  <!-- 副标题 -->
  <text x="80" y="88" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#888888" letter-spacing="2">
    SECURE VDI CLIENT
  </text>
</svg>
