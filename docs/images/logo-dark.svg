<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <!-- 深色模式：左半边用亮翠绿渐变 -->
    <linearGradient id="leftGradDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ADE80;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22C55E;stop-opacity:1" />
    </linearGradient>
    <!-- 深色模式：右半边用冷调青绿 -->
    <linearGradient id="rightGradDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2DD4BF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14B8A6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 深色背景（可选，用于独立展示时） -->
  <rect width="256" height="256" fill="#1E1E1E" rx="24" />

  <!-- V 左半边（亮翠绿） -->
  <polygon points="128,48 40,216 80,216 128,100" fill="url(#leftGradDark)" />

  <!-- V 右半边（冷青绿） -->
  <polygon points="128,48 216,216 176,216 128,100" fill="url(#rightGradDark)" />

  <!-- 外发光描边（可选） -->
  <polygon points="128,48 40,216 80,216 128,100" fill="none" stroke="#4ADE80" stroke-opacity="0.3" stroke-width="1.5" />
  <polygon points="128,48 216,216 176,216 128,100" fill="none" stroke="#2DD4BF" stroke-opacity="0.3" stroke-width="1.5" />
</svg>
